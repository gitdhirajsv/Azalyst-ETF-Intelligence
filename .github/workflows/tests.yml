name: Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "azalyst_portfolio.json"
      - "azalyst_state.json"
      - "status.json"
      - "data/**"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  # Allow tests to run in parallel for different SHAs but cancel stale runs
  # for the same ref (e.g. force-pushed PR branch).
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v
