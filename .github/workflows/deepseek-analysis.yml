
name: DeepSeek Azalyst Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required to post comments on PRs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies for analysis script
        run: pip install requests openai

      - name: Install Azalyst dependencies
        run: pip install -r requirements.txt

      - name: Run Azalyst engine (single cycle) and capture output
        # We run azalyst.py with --once and capture its stdout/stderr
        # You might need to adjust this command based on how azalyst.py logs
        run: python azalyst.py --once > azalyst_output.log 2>&1 || true
        # The '|| true' ensures the workflow doesn't fail if azalyst.py exits with an error code

      - name: Run DeepSeek Analysis via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub Actions
        run: python analyze_azalyst_output.py azalyst_output.log

      - name: Post Recommendations as PR Comment or Job Summary
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const recommendations = fs.readFileSync('deepseek_recommendations.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🤖 DeepSeek Analysis for Azalyst-ETF-Intelligence 🤖\n\n${recommendations}`
            })

      - name: Add Recommendations to Job Summary (for push events)
        if: github.event_name == 'push'
        run: |
          echo "### 🤖 DeepSeek Analysis for Azalyst-ETF-Intelligence 🤖" >> $GITHUB_STEP_SUMMARY
          cat deepseek_recommendations.md >> $GITHUB_STEP_SUMMARY
