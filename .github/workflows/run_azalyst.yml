name: Run Azalyst
on:
  push:
    branches: [ beta ]
    paths-ignore:
      - "azalyst_portfolio.json"
      - "azalyst_state.json"
      - "status.json"
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: azalyst-run
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: beta
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Azalyst engine (single cycle)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python azalyst.py --once
      - name: Generate dashboard
        run: python generate_dashboard.py
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f azalyst_portfolio.json azalyst_state.json status.json || true
          git diff --staged --quiet || git commit -m "chore: update portfolio and state [skip ci]"
          git push origin beta
      - name: Deploy dashboard to GitHub Pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          tmpdir="$(mktemp -d)"
          cp index.html "$tmpdir/index.html"
          cp dashboard.js "$tmpdir/dashboard.js"
          cp status.json "$tmpdir/status.json"

          # Build a clean gh-pages tree with only dashboard files
          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-deploy
          git reset --hard
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp "$tmpdir/index.html" .
          cp "$tmpdir/dashboard.js" .
          cp "$tmpdir/status.json" .
          touch .nojekyll
          git add index.html dashboard.js status.json .nojekyll
          git commit -m "deploy: dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages-deploy:gh-pages --force
