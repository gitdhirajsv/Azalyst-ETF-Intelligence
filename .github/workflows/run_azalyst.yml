name: Run Azalyst
on:
  push:
    branches: [ main ]
    paths-ignore:
      - "azalyst_portfolio.json"
      - "azalyst_state.json"
      - "status.json"
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: azalyst-run
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Azalyst engine (single cycle)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python azalyst.py --once
      - name: Generate dashboard
        run: python generate_dashboard.py
      - name: Upload state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ github.run_id }}
          path: |
            azalyst_state.json
            azalyst_portfolio.json
            status.json
            improvement_log.jsonl
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Only include files needed for the dashboard
          path: .
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
