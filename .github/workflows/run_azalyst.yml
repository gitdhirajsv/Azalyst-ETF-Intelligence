name: Run Azalyst
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
concurrency:
  group: azalyst-run
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Run Azalyst engine
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python azalyst.py

      - name: Debug - inspect state files
        run: |
          echo "=== azalyst_portfolio.json ==="
          cat azalyst_portfolio.json || echo "MISSING"
          echo ""
          echo "=== azalyst_state.json ==="
          cat azalyst_state.json || echo "MISSING"

      - name: Generate status.json
        run: python generate_dashboard.py

      - name: Screenshot dashboard
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright
          import os
          os.makedirs("docs", exist_ok=True)
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page(viewport={"width": 1280, "height": 900})
              page.goto("file://" + os.path.abspath("index.html"))
              page.wait_for_timeout(3000)
              page.screenshot(path="docs/dashboard_live.png", full_page=True)
              browser.close()
          print("Screenshot saved to docs/dashboard_live.png")
          EOF

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add status.json azalyst_portfolio.json azalyst_state.json docs/
          git commit -m "Update dashboard data" || echo "No changes to commit"
          git push origin main
