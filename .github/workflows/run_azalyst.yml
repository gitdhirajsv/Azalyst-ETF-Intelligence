name: Run Azalyst
on:
  push:
    branches: [ main ]
    paths-ignore:
      - "azalyst_portfolio.json"
      - "azalyst_state.json"
      - "status.json"
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: azalyst-run
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scipy>=1.11
      - name: Run Azalyst engine (single cycle)
        continue-on-error: true   # legacy v1 engine — failure must not block v2 fusion + dashboard
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python azalyst.py --once
      - name: Run v2 alpha fusion (regime + 6-layer scoring + leaderboard)
        continue-on-error: true   # do not block dashboard if a free-tier feed is rate-limited
        run: python -m azalyst_alpha.fusion
      - name: Generate dashboard
        run: python generate_dashboard.py
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f azalyst_portfolio.json azalyst_state.json status.json || true
          git diff --staged --quiet && echo "no state changes" && exit 0 || true
          git commit -m "chore: update portfolio and state [skip ci]"
          # Retry-with-rebase loop: cron and human pushes can land on main
          # while this runner was working. Pull --rebase, then push. Up to 5
          # attempts before giving up so the gh-pages deploy step still runs.
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "push succeeded on attempt $attempt"
              break
            fi
            echo "push attempt $attempt rejected — pulling with rebase"
            git pull --rebase --autostash origin main || { echo "rebase failed"; exit 1; }
            sleep $((attempt * 2))
          done
      - name: Deploy dashboard to GitHub Pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          tmpdir="$(mktemp -d)"
          cp index.html "$tmpdir/index.html"
          cp dashboard.js "$tmpdir/dashboard.js"
          cp status.json "$tmpdir/status.json"

          # Build a clean gh-pages tree with only dashboard files
          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-deploy
          git reset --hard
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp "$tmpdir/index.html" .
          cp "$tmpdir/dashboard.js" .
          cp "$tmpdir/status.json" .
          touch .nojekyll
          git add index.html dashboard.js status.json .nojekyll
          git commit -m "deploy: dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages-deploy:gh-pages --force
